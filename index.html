<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ballerz Free Throw</title>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap)" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Press Start 2P', cursive;
      background: #0a0a12;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      padding: 10px;
      overflow-x: hidden;
    }

    .game-wrapper {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      margin-bottom: 8px;
      width: 100%;
    }

    .logo {
      font-size: 1.3rem;
      color: #f97316;
      text-shadow: 3px 3px 0 #7c2d12;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 0.4rem;
      color: #a855f7;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .wallet-btn, .sound-btn {
      background: #7c3aed;
      border: 2px solid #a855f7;
      padding: 6px 12px;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.4rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .wallet-btn:hover, .sound-btn:hover { background: #6d28d9; }
    .wallet-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .wallet-btn.connected {
      background: #059669;
      border-color: #34d399;
    }

    .sound-btn { 
      padding: 6px 10px;
      font-size: 0.6rem;
      min-width: 40px;
    }

    .sound-btn.muted {
      background: #991b1b;
      border-color: #f87171;
    }

    .wallet-info {
      font-size: 0.4rem;
      color: #a78bfa;
    }

    .wallet-info.has-ballerz { color: #4ade80; }

    .nft-selector {
      display: none;
      margin-top: 8px;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nft-selector.show { display: flex; }

    .nft-thumb {
      width: 40px;
      height: 40px;
      border: 2px solid #333;
      cursor: pointer;
      transition: all 0.2s;
      background: #1a1a2e;
    }

    .nft-thumb:hover { border-color: #a855f7; }
    .nft-thumb.selected { border-color: #f97316; box-shadow: 0 0 10px #f97316; }

    .game-container {
      position: relative;
      border: 4px solid #f97316;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(249, 115, 22, 0.2);
      margin-top: 10px;
    }

    #gameCanvas {
      display: block;
      cursor: pointer;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .controls {
      width: 100%;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 25px;
      width: 100%;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border: 2px solid #f97316;
    }

    .stat { text-align: center; }

    .stat-value {
      font-size: 1.1rem;
      color: #fbbf24;
      text-shadow: 2px 2px 0 #92400e;
    }

    .stat-label {
      font-size: 0.35rem;
      color: #9ca3af;
      margin-top: 3px;
    }

    .shoot-btn {
      width: 100%;
      max-width: 250px;
      padding: 12px 25px;
      border: none;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.8rem;
      cursor: pointer;
      background: linear-gradient(180deg, #fb923c, #f97316, #ea580c);
      color: white;
      box-shadow: 0 4px 0 #9a3412;
      text-shadow: 1px 1px 0 #7c2d12;
    }

    .shoot-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #9a3412;
    }

    .instructions {
      font-size: 0.45rem;
      color: #9ca3af;
      text-align: center;
      min-height: 16px;
    }

    .instructions.success { color: #4ade80; }
    .instructions.miss { color: #f87171; }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #a855f7;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 5px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="header">
      <div class="logo">BALLERZ</div>
      <div class="subtitle">FREE THROW ARCADE</div>
      <div class="top-bar">
        <button class="wallet-btn" id="walletBtn">CONNECT WALLET</button>
        <button class="sound-btn" id="soundBtn">🔊</button>
        <span class="wallet-info" id="walletInfo">Guest Mode</span>
      </div>
      <div class="nft-selector" id="nftSelector"></div>
    </div>

    <div class="game-container">
      <canvas id="gameCanvas" width="480" height="520"></canvas>
    </div>

    <div class="controls">
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="score">0</div>
          <div class="stat-label">SCORE</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="streak">0</div>
          <div class="stat-label">STREAK</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="best">0</div>
          <div class="stat-label">BEST</div>
        </div>
      </div>
      <button class="shoot-btn" id="shootBtn">SHOOT!</button>
      <div class="instructions" id="instructions">PRESS SHOOT TO START</div>
    </div>
  </div>

  <!-- Flow FCL -->
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@onflow/fcl@1.3.0/dist/fcl.min.js)"></script>
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@onflow/types@1.0.0/dist/types.min.js)"></script>

  <script>
    // ============ BACKGROUND MUSIC ============
    
    var bgmTracks = ['bgm1.mp3', 'bgm2.mp3', 'bgm3.mp3'];
    var currentBgm = null;
    var bgmIndex = Math.floor(Math.random() * bgmTracks.length);
    var musicStarted = false;
    var musicEnabled = true;

    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      playNextTrack();
    }

    function playNextTrack() {
      if (!musicEnabled) return;
      
      // Pick a different track than the current one
      var newIndex;
      do {
        newIndex = Math.floor(Math.random() * bgmTracks.length);
      } while (newIndex === bgmIndex && bgmTracks.length > 1);
      bgmIndex = newIndex;
      
      if (currentBgm) {
        currentBgm.pause();
        currentBgm = null;
      }
      
      currentBgm = new Audio(bgmTracks[bgmIndex]);
      currentBgm.volume = 0.4;
      currentBgm.addEventListener('ended', playNextTrack);
      currentBgm.play().catch(function(e) {
        console.log('Music autoplay blocked:', e);
      });
      
      console.log('Now playing:', bgmTracks[bgmIndex]);
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      
      if (musicEnabled) {
        if (musicStarted) {
          playNextTrack();
        }
      } else {
        if (currentBgm) {
          currentBgm.pause();
        }
      }
    }

    // ============ AUDIO ENGINE (SFX) ============
    
    var audioCtx = null;
    var sfxEnabled = true;
    var audioInitialized = false;

    function initAudio() {
      if (audioInitialized) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioInitialized = true;
        startMusic();
      } catch(e) {
        console.log('Web Audio not supported');
      }
    }

    // Sound toggle - now controls both music and SFX
    document.getElementById('soundBtn').addEventListener('click', function() {
      sfxEnabled = !sfxEnabled;
      toggleMusic();
      this.textContent = sfxEnabled ? '🔊' : '🔇';
      this.classList.toggle('muted', !sfxEnabled);
    });

    function playTone(freq, duration, type, volume, delay) {
      if (!sfxEnabled || !audioCtx) return;
      delay = delay || 0;
      
      setTimeout(function() {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(volume || 0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + duration);
      }, delay);
    }

    function playNoise(duration, volume, filterFreq) {
      if (!sfxEnabled || !audioCtx) return;
      
      var bufferSize = audioCtx.sampleRate * duration;
      var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      var data = buffer.getChannelData(0);
      
      for (var i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      var noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      var filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = filterFreq || 1000;
      filter.Q.value = 0.5;
      
      var gain = audioCtx.createGain();
      gain.gain.setValueAtTime(volume || 0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      
      noise.start();
    }

    // ============ SOUND EFFECTS ============

    function playShootSound() {
      initAudio();
      playTone(400, 0.1, 'sine', 0.15);
      playTone(600, 0.1, 'sine', 0.1, 30);
    }

    function playSwishSound() {
      initAudio();
      playNoise(0.3, 0.15, 2000);
      playTone(523, 0.15, 'square', 0.12, 50);
      playTone(659, 0.15, 'square', 0.12, 120);
      playTone(784, 0.15, 'square', 0.12, 190);
      playTone(1047, 0.25, 'square', 0.15, 260);
    }

    function playPerfectSound() {
      initAudio();
      playNoise(0.2, 0.1, 3000);
      playTone(784, 0.1, 'sine', 0.15, 0);
      playTone(988, 0.1, 'sine', 0.15, 80);
      playTone(1175, 0.1, 'sine', 0.15, 160);
      playTone(1568, 0.3, 'sine', 0.2, 240);
      // Extra sparkle
      playTone(2093, 0.2, 'sine', 0.1, 400);
      playTone(2637, 0.3, 'sine', 0.08, 500);
    }

    function playStreakSound(streakNum) {
      initAudio();
      playNoise(0.2, 0.12, 2500);
      
      var baseNote = 523;
      playTone(baseNote, 0.1, 'square', 0.12, 0);
      playTone(baseNote * 1.25, 0.1, 'square', 0.12, 60);
      playTone(baseNote * 1.5, 0.1, 'square', 0.12, 120);
      playTone(baseNote * 2, 0.3, 'sawtooth', 0.15, 180);
      
      if (streakNum >= 3) {
        playTone(baseNote * 2.5, 0.2, 'square', 0.1, 350);
        playTone(baseNote * 3, 0.3, 'sawtooth', 0.12, 450);
      }
      if (streakNum >= 5) {
        playNoise(0.8, 0.2, 800);
      }
    }

    function playMissSound() {
      initAudio();
      playTone(300, 0.2, 'square', 0.12);
      playTone(200, 0.3, 'square', 0.1, 150);
      playTone(150, 0.4, 'sawtooth', 0.08, 350);
    }

    function playRimSound() {
      initAudio();
      playTone(180, 0.15, 'triangle', 0.2);
      playTone(120, 0.1, 'sine', 0.15, 50);
      playNoise(0.05, 0.1, 3000);
    }

    function playBounceSound() {
      initAudio();
      playTone(100, 0.1, 'sine', 0.2);
      playTone(80, 0.15, 'triangle', 0.1, 30);
    }

    function playClickSound() {
      initAudio();
      playTone(800, 0.05, 'square', 0.08);
    }

    function playMeterLockSound() {
      initAudio();
      playTone(600, 0.08, 'square', 0.1);
      playTone(900, 0.1, 'square', 0.12, 50);
    }

    function playPerfectLockSound() {
      initAudio();
      playTone(800, 0.08, 'sine', 0.12);
      playTone(1200, 0.12, 'sine', 0.15, 50);
    }

    // ============ FLOW WALLET INTEGRATION ============
    
    fcl.config({
      "app.detail.title": "Ballerz Free Throw",
      "app.detail.icon": "[ballerz.world](https://ballerz.world/logo.png)",
      "accessNode.api": "[rest-mainnet.onflow.org](https://rest-mainnet.onflow.org)",
      "discovery.wallet": "[fcl-discovery.onflow.org](https://fcl-discovery.onflow.org/authn)",
      "flow.network": "mainnet"
    });

    var userWallet = null;
    var userBallerz = [];
    var selectedNFT = null;
    var nftImage = null;

    document.getElementById('walletBtn').addEventListener('click', async function() {
      initAudio();
      playClickSound();
      
      var btn = this;
      var info = document.getElementById('walletInfo');
      
      if (userWallet) {
        await fcl.unauthenticate();
        userWallet = null;
        userBallerz = [];
        selectedNFT = null;
        nftImage = null;
        btn.textContent = 'CONNECT WALLET';
        btn.classList.remove('connected');
        info.textContent = 'Guest Mode';
        info.classList.remove('has-ballerz');
        document.getElementById('nftSelector').classList.remove('show');
        document.getElementById('nftSelector').innerHTML = '';
        useGuestBaller();
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'CONNECTING<span class="loading-spinner"></span>';

      try {
        await fcl.authenticate();
        var user = await fcl.currentUser.snapshot();
        
        if (user.loggedIn) {
          userWallet = user.addr;
          btn.textContent = userWallet.slice(0, 6) + '...' + userWallet.slice(-4);
          btn.classList.add('connected');
          info.innerHTML = 'Loading Ballerz<span class="loading-spinner"></span>';
          
          await fetchBallerz(userWallet);
          
          if (userBallerz.length > 0) {
            info.textContent = userBallerz.length + ' Ballerz found!';
            info.classList.add('has-ballerz');
            showNFTSelector();
            selectNFT(0);
            playSwishSound();
          } else {
            info.textContent = 'No Ballerz found - Guest Mode';
            useGuestBaller();
          }
        }
      } catch (err) {
        console.error('Wallet error:', err);
        info.textContent = 'Connection failed';
        btn.textContent = 'CONNECT WALLET';
        useGuestBaller();
        playMissSound();
      }
      
      btn.disabled = false;
    });

    async function fetchBallerz(address) {
      userBallerz = [];
      
      try {
        var result = await fcl.query({
          cadence: `
            import Gaia from 0x8b148183c28ff88f
            
            pub fun main(address: Address): [{String: AnyStruct}] {
              let account = getAccount(address)
              let collection = account.getCapability<&{Gaia.CollectionPublic}>(Gaia.CollectionPublicPath).borrow()
              
              if collection == nil {
                return []
              }
              
              let nfts: [{String: AnyStruct}] = []
              let ids = collection!.getIDs()
              
              for id in ids {
                let nft = collection!.borrowGaiaNFT(id: id)!
                let metadata = nft.metadata
                
                let setName = metadata.setName()
                if setName == "Ballerz" {
                  nfts.append({
                    "id": id,
                    "name": metadata.name(),
                    "image": metadata.image() ?? "",
                    "setName": setName
                  })
                }
              }
              
              return nfts
            }
          `,
          args: (arg, t) => [arg(address, t.Address)]
        });
        
        userBallerz = result || [];
        
      } catch (err) {
        console.error('Error fetching Ballerz:', err);
        
        try {
          var fallbackResult = await fcl.query({
            cadence: `
              import NonFungibleToken from 0x1d7e57aa55817448
              import MetadataViews from 0x1d7e57aa55817448
              
              pub fun main(address: Address): [{String: AnyStruct}] {
                let account = getAccount(address)
                let nfts: [{String: AnyStruct}] = []
                
                let collectionPaths = [
                  /public/GaiaCollection,
                  /public/BallerCollection
                ]
                
                for path in collectionPaths {
                  if let collection = account.getCapability<&{NonFungibleToken.CollectionPublic, MetadataViews.ResolverCollection}>(path).borrow() {
                    for id in collection.getIDs() {
                      let resolver = collection.borrowViewResolver(id: id)
                      if let display = MetadataViews.getDisplay(resolver) {
                        nfts.append({
                          "id": id,
                          "name": display.name,
                          "image": display.thumbnail.uri(),
                          "setName": "Ballerz"
                        })
                      }
                    }
                  }
                }
                
                return nfts
              }
            `,
            args: (arg, t) => [arg(address, t.Address)]
          });
          
          userBallerz = fallbackResult || [];
        } catch (e2) {
          console.error('Fallback query also failed:', e2);
        }
      }
    }

    function showNFTSelector() {
      var selector = document.getElementById('nftSelector');
      selector.innerHTML = '';
      selector.classList.add('show');
      
      userBallerz.forEach(function(nft, index) {
        var thumb = document.createElement('img');
        thumb.className = 'nft-thumb';
        thumb.src = nft.image || 'data:image/svg+xml,<svg xmlns="[w3.org](http://www.w3.org/2000/svg)" width="40" height="40"><rect fill="%237c3aed" width="40" height="40"/><text x="20" y="25" text-anchor="middle" fill="white" font-size="10">' + (index + 1) + '</text></svg>';
        thumb.alt = nft.name || 'Baller #' + nft.id;
        thumb.title = nft.name || 'Baller #' + nft.id;
        thumb.onclick = function() { 
          playClickSound();
          selectNFT(index); 
        };
        thumb.onerror = function() {
          this.src = 'data:image/svg+xml,<svg xmlns="[w3.org](http://www.w3.org/2000/svg)" width="40" height="40"><rect fill="%237c3aed" width="40" height="40"/><text x="20" y="25" text-anchor="middle" fill="white" font-size="10">' + (index + 1) + '</text></svg>';
        };
        selector.appendChild(thumb);
      });
    }

    function selectNFT(index) {
      selectedNFT = userBallerz[index];
      useNFTAsBaller = true;
      
      var thumbs = document.querySelectorAll('.nft-thumb');
      thumbs.forEach(function(t, i) {
        t.classList.toggle('selected', i === index);
      });
      
      if (selectedNFT && selectedNFT.image) {
        nftImage = new Image();
        nftImage.crossOrigin = 'anonymous';
        nftImage.src = selectedNFT.image;
      }
    }

    function useGuestBaller() {
      useNFTAsBaller = false;
      selectedNFT = null;
      nftImage = null;
    }

    // ============ GAME CODE ============

    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    var W = 480, H = 520;
    var shootBtn = document.getElementById('shootBtn');
    var instructions = document.getElementById('instructions');
    var scoreEl = document.getElementById('score');
    var streakEl = document.getElementById('streak');
    var bestEl = document.getElementById('best');

    var phase = 'ready';
    // Power: 0-100, sweet spot is 40-60 (center 20%)
    var power = 0, powerDir = 1;
    // Aim: 0-100, sweet spot is 40-60 (center 20%)
    var aim = 0, aimDir = 1;
    var lockedPower = 50;
    var lockedAim = 50;
    
    var score = 0, streak = 0, best = 0;
    var ball = null;
    var ballTrail = [];
    var hoop = { x: W/2, y: 125, rimWidth: 48 };
    var player = { x: W/2, y: 400 };
    var madeShot = false;
    var netSway = 0;
    var frameCount = 0;
    var useNFTAsBaller = false;
    var rimHitPlayed = false;
    var perfectShot = false;

    // Crowd
    var crowd = [];
    for (var i = 0; i < 60; i++) {
      crowd.push({
        x: Math.random() * W,
        y: 30 + Math.random() * 70,
        color: ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#ffffff'][Math.floor(Math.random()*8)],
        phase: Math.random() * Math.PI * 2,
        speed: 0.05 + Math.random() * 0.05
      });
    }

    // Guest Ballerz sprites
    var ballerTypes = [
      {
        name: 'Purple Flash',
        skin: '#8B5A2B', skinShade: '#6B4423',
        hair: '#0a0a0a', hairStyle: 'flat-top',
        headband: '#fbbf24', headbandShade: '#d97706',
        jersey: '#a855f7', jerseyShade: '#7c3aed', jerseyTrim: '#fbbf24',
        number: '24',
        shorts: '#1a1a1a', shortsStripe: '#fbbf24',
        shoes: '#1a1a1a', shoeAccent: '#fbbf24',
        earring: '#fbbf24', grillz: '#fbbf24', chain: null
      },
      {
        name: 'Pink Phantom',
        skin: '#e879f9', skinShade: '#c026d3',
        hair: '#0a0a0a', hairStyle: 'afro',
        headband: '#f97316', headbandShade: '#c2410c',
        jersey: '#be185d', jerseyShade: '#9d174d', jerseyTrim: '#f97316',
        number: '4',
        shorts: '#1a1a1a', shortsStripe: '#f97316',
        shoes: '#1a1a1a', shoeAccent: '#f97316',
        earring: null, grillz: null, chain: '#fbbf24'
      },
      {
        name: 'Wave Master',
        skin: '#deb887', skinShade: '#b8956e',
        hair: '#3d2914', hairStyle: 'waves',
        headband: null, headbandShade: null,
        jersey: '#06b6d4', jerseyShade: '#a855f7', jerseyTrim: '#ec4899',
        number: '23',
        shorts: '#1a1a1a', shortsStripe: '#06b6d4',
        shoes: '#1a1a1a', shoeAccent: '#ec4899',
        earring: null, grillz: null, chain: null, goatee: '#3d2914'
      }
    ];

    var currentBaller = ballerTypes[Math.floor(Math.random() * ballerTypes.length)];

    // Check if value is in the sweet spot (40-60, center 20%)
    function isInSweetSpot(value) {
      return value >= 40 && value <= 60;
    }

    function handleShoot() {
      initAudio();
      
      if (phase === 'ready') {
        phase = 'power';
        instructions.textContent = 'SET POWER!';
        instructions.className = 'instructions';
        playClickSound();
      } else if (phase === 'power') {
        lockedPower = power;
        phase = 'aim';
        instructions.textContent = 'SET AIM!';
        if (isInSweetSpot(power)) {
          playPerfectLockSound();
        } else {
          playMeterLockSound();
        }
      } else if (phase === 'aim') {
        lockedAim = aim;
        phase = 'shooting';
        madeShot = false;
        rimHitPlayed = false;
        
        // Check for perfect shot (both meters in sweet spot)
        perfectShot = isInSweetSpot(lockedPower) && isInSweetSpot(lockedAim);
        
        if (isInSweetSpot(aim)) {
          playPerfectLockSound();
        } else {
          playMeterLockSound();
        }
        
        if (perfectShot) {
          instructions.textContent = '✨ PERFECT! ✨';
          instructions.className = 'instructions success';
        } else {
          instructions.textContent = '';
        }
        
        setTimeout(function() { playShootSound(); }, 50);
        
        // Calculate shot trajectory based on meter positions
        // Power: 40-60 is perfect (gives ideal arc)
        // Aim: 40-60 is perfect (goes straight to hoop)
        
        var powerOffset = (lockedPower - 50) / 50; // -1 to 1, 0 is perfect
        var aimOffset = (lockedAim - 50) / 50; // -1 to 1, 0 is perfect
        
        // Base trajectory for perfect shot
        var baseVY = -14.5;
        var baseVX = 0;
        
        // Adjust based on power (affects arc height)
        var targetVY = baseVY - (powerOffset * 3); // Too low = short, too high = long
        
        // Adjust based on aim (affects left/right)
        var targetVX = aimOffset * 4; // Negative = left, positive = right
        
        // Perfect shot gets slight aim assist
        if (perfectShot) {
          targetVX *= 0.3;
          targetVY = baseVY;
        }
        
        ball = {
          x: player.x,
          y: player.y - 50,
          vx: targetVX,
          vy: targetVY,
          gravity: 0.26,
          rotation: 0
        };
        ballTrail = [];
      }
    }

    shootBtn.onclick = handleShoot;
    canvas.onclick = handleShoot;

    function update() {
      frameCount++;
      
      // Power meter oscillates 0-100
      if (phase === 'power') {
        power += powerDir * 1.8;
        if (power >= 100) { power = 100; powerDir = -1; }
        if (power <= 0) { power = 0; powerDir = 1; }
      }
      
      // Aim meter oscillates 0-100 (left to right)
      if (phase === 'aim') {
        aim += aimDir * 2.0;
        if (aim >= 100) { aim = 100; aimDir = -1; }
        if (aim <= 0) { aim = 0; aimDir = 1; }
      }

      if (netSway > 0.01) netSway *= 0.93;
      else netSway = 0;

      if (ball && !madeShot) {
        ballTrail.push({ x: ball.x, y: ball.y });
        if (ballTrail.length > 8) ballTrail.shift();

        ball.vy += ball.gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;
        ball.rotation += ball.vx * 0.1;

        if (ball.vy > 0 && ball.y >= hoop.y && ball.y <= hoop.y + 35) {
          var hoopLeft = hoop.x - hoop.rimWidth / 2;
          var hoopRight = hoop.x + hoop.rimWidth / 2;
          
          if (ball.x > hoopLeft + 6 && ball.x < hoopRight - 6) {
            madeShot = true;
            netSway = 1;
            score++;
            streak++;
            if (streak > best) best = streak;
            updateStats();
            crowd.forEach(function(c) { c.speed = 0.15; });
            
            if (perfectShot) {
              playPerfectSound();
            } else if (streak >= 2) {
              playStreakSound(streak);
            } else {
              playSwishSound();
            }
            
            endShot(true);
            return;
          }
          
          // Rim collision
          if ((ball.x > hoopLeft - 4 && ball.x < hoopLeft + 8) || 
              (ball.x > hoopRight - 8 && ball.x < hoopRight + 4)) {
            
            if (!rimHitPlayed) {
              playRimSound();
              rimHitPlayed = true;
            }
            
            if (Math.random() < 0.3) {
              ball.vx = (hoop.x - ball.x) * 0.1;
              ball.vy = -2;
            } else {
              ball.vx = ball.x < hoop.x ? -2 : 2;
              ball.vy = -1;
            }
          }
        }

        if (ball.y > H - 30 && ball.vy > 0) {
          playBounceSound();
        }

        if (ball.y > H + 50 || ball.x < -50 || ball.x > W + 50) {
          streak = 0;
          updateStats();
          playMissSound();
          endShot(false);
        }
      }

      crowd.forEach(function(c) {
        if (c.speed > 0.05) c.speed *= 0.99;
      });
    }

    function endShot(made) {
      if (made) {
        if (perfectShot) {
          instructions.textContent = '✨ PERFECT! +' + streak + ' ✨';
        } else {
          instructions.textContent = 'SWISH! +' + streak + ' 🔥';
        }
        instructions.className = 'instructions success';
      } else {
        instructions.textContent = 'MISS!';
        instructions.className = 'instructions miss';
      }
      
      setTimeout(function() {
        ball = null;
        ballTrail = [];
        phase = 'ready';
        power = 0;
        aim = 0;
        perfectShot = false;
        if (!useNFTAsBaller) {
          currentBaller = ballerTypes[Math.floor(Math.random() * ballerTypes.length)];
        }
        instructions.textContent = 'PRESS SHOOT';
        instructions.className = 'instructions';
      }, 1100);
    }

    function updateStats() {
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      bestEl.textContent = best;
    }

    function draw() {
      // Arena background
      var bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#1a1a2e');
      bgGrad.addColorStop(0.25, '#252550');
      bgGrad.addColorStop(0.4, '#1a1a2e');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Stadium lights
      ctx.fillStyle = 'rgba(255, 200, 100, 0.03)';
      ctx.beginPath();
      ctx.arc(W/2, -50, 300, 0, Math.PI * 2);
      ctx.fill();

      // Stands
      ctx.fillStyle = '#1a1a28';
      ctx.fillRect(0, 0, W, 110);

      // Crowd
      crowd.forEach(function(c) {
        var bounce = Math.sin(frameCount * c.speed + c.phase) * 3;
        var y = c.y + bounce;
        ctx.fillStyle = ['#deb887', '#8B5A2B', '#d4a574', '#e8beac', '#c68642'][Math.floor(c.phase * 2) % 5];
        ctx.fillRect(c.x, y, 6, 6);
        ctx.fillStyle = c.color;
        ctx.fillRect(c.x - 1, y + 6, 8, 10);
      });

      // Barrier
      ctx.fillStyle = '#f97316';
      ctx.fillRect(0, 105, W, 6);
      ctx.fillStyle = '#7c2d12';
      ctx.fillRect(0, 108, W, 3);

      // Court
      var courtGrad = ctx.createLinearGradient(0, 110, 0, H);
      courtGrad.addColorStop(0, '#c2803d');
      courtGrad.addColorStop(0.5, '#d4923d');
      courtGrad.addColorStop(1, '#a66a2e');
      ctx.fillStyle = courtGrad;
      ctx.fillRect(0, 110, W, H - 110);

      // Wood grain
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 1;
      for (var w = 0; w < W; w += 20) {
        ctx.beginPath();
        ctx.moveTo(w, 110);
        ctx.lineTo(w, H);
        ctx.stroke();
      }

      // 3-point line
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(W/2, 160, 180, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(W/2 - 175, 160);
      ctx.lineTo(W/2 - 175, H);
      ctx.moveTo(W/2 + 175, 160);
      ctx.lineTo(W/2 + 175, H);
      ctx.stroke();

      // Key
      ctx.fillStyle = 'rgba(185, 28, 28, 0.7)';
      ctx.fillRect(W/2 - 70, 130, 140, 180);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.strokeRect(W/2 - 70, 130, 140, 180);

      // Free throw line
      ctx.beginPath();
      ctx.moveTo(W/2 - 70, 310);
      ctx.lineTo(W/2 + 70, 310);
      ctx.stroke();

      // Free throw circle
      ctx.beginPath();
      ctx.arc(W/2, 310, 45, Math.PI, 2 * Math.PI);
      ctx.stroke();
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.arc(W/2, 310, 45, 0, Math.PI);
      ctx.stroke();
      ctx.setLineDash([]);

      // Restricted area
      ctx.beginPath();
      ctx.arc(W/2, 160, 35, 0, Math.PI);
      ctx.stroke();

      // Hash marks
      ctx.lineWidth = 2;
      for (var h = 155; h < 310; h += 25) {
        ctx.beginPath();
        ctx.moveTo(W/2 - 75, h);
        ctx.lineTo(W/2 - 65, h);
        ctx.moveTo(W/2 + 65, h);
        ctx.lineTo(W/2 + 75, h);
        ctx.stroke();
      }

      // Center circle
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(W/2, H + 80, 50, Math.PI, 2 * Math.PI);
      ctx.stroke();

      // Backboard shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(W/2 - 50 + 4, 90 + 4, 100, 55);

      // Backboard
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(W/2 - 50, 88, 100, 55);
      ctx.fillStyle = '#e5e5e5';
      ctx.fillRect(W/2 - 50, 88, 100, 5);
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(W/2 - 50, 88, 5, 55);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 3;
      ctx.strokeRect(W/2 - 50, 88, 100, 55);
      ctx.strokeStyle = '#f97316';
      ctx.lineWidth = 3;
      ctx.strokeRect(W/2 - 25, 98, 50, 35);

      // Rim support
      ctx.fillStyle = '#666';
      ctx.fillRect(W/2 - 5, 140, 10, 8);

      // Rim
      ctx.fillStyle = '#f97316';
      ctx.fillRect(hoop.x - hoop.rimWidth/2, hoop.y - 3, hoop.rimWidth, 6);
      ctx.fillStyle = '#c2410c';
      ctx.fillRect(hoop.x - hoop.rimWidth/2, hoop.y + 1, hoop.rimWidth, 2);

      // Net
      drawNet();

      // Ball trail
      ballTrail.forEach(function(t, i) {
        var alpha = (i / ballTrail.length) * 0.4;
        var size = 6 + (i / ballTrail.length) * 8;
        ctx.fillStyle = 'rgba(249, 115, 22, ' + alpha + ')';
        ctx.beginPath();
        ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
        ctx.fill();
      });

      // Draw player
      if (useNFTAsBaller && nftImage && nftImage.complete) {
        drawNFTPlayer(player.x, player.y);
      } else {
        drawBallerSprite(player.x, player.y, currentBaller);
      }

      // Ball
      if (ball) {
        drawBall(ball.x, ball.y, 12, ball.rotation);
      } else if (phase !== 'shooting') {
        drawBall(player.x + 24, player.y - 42, 11, 0);
      }

      // Power meter (vertical, left side)
      if (phase === 'power' || phase === 'aim' || phase === 'shooting') {
        drawPowerMeter();
      }

      // Aim meter (horizontal, bottom)
      if (phase === 'aim' || phase === 'shooting') {
        drawAimMeter();
      }
    }

    function drawPowerMeter() {
      var x = 25, y = 150, w = 24, h = 180;
      
      // Background
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x, y, w, h);

      // Zones - red on edges, green in center
      var zoneHeight = h / 5; // 20% each zone
      
      // Bottom red zone (0-40%)
      ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
      ctx.fillRect(x, y + h - zoneHeight * 2, w, zoneHeight * 2);
      
      // Center green zone (40-60%)
      ctx.fillStyle = 'rgba(34, 197, 94, 0.5)';
      ctx.fillRect(x, y + zoneHeight * 2, w, zoneHeight);
      
      // Top red zone (60-100%)
      ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
      ctx.fillRect(x, y, w, zoneHeight * 2);

      // Current value indicator
      var currentPower = phase === 'power' ? power : lockedPower;
      var indicatorY = y + h - (currentPower / 100) * h;
      
      // Indicator bar
      ctx.fillStyle = phase === 'power' ? '#ffffff' : (isInSweetSpot(lockedPower) ? '#4ade80' : '#f87171');
      ctx.fillRect(x - 5, indicatorY - 3, w + 10, 6);
      
      // Glow effect when in sweet spot
      if (phase === 'power' && isInSweetSpot(power)) {
        ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
        ctx.fillRect(x - 8, indicatorY - 6, w + 16, 12);
      }

      // Border
      ctx.strokeStyle = '#f97316';
      ctx.lineWidth = 3;
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);

      // Label
      ctx.fillStyle = '#fbbf24';
      ctx.font = '8px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('PWR', x + w/2, y + h + 18);
    }

    function drawAimMeter() {
      var x = 90, y = 480, w = 300, h = 20;
      
      // Background
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(x - 3, y - 3, w + 6, h + 6);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x, y, w, h);

      // Zones - red on edges, green in center
      var zoneWidth = w / 5; // 20% each zone
      
      // Left red zone (0-40%)
      ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
      ctx.fillRect(x, y, zoneWidth * 2, h);
      
      // Center green zone (40-60%)
      ctx.fillStyle = 'rgba(34, 197, 94, 0.5)';
      ctx.fillRect(x + zoneWidth * 2, y, zoneWidth, h);
      
      // Right red zone (60-100%)
      ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
      ctx.fillRect(x + zoneWidth * 3, y, zoneWidth * 2, h);

      // Current value indicator
      var currentAim = phase === 'aim' ? aim : lockedAim;
      var indicatorX = x + (currentAim / 100) * w;
      
      // Indicator bar
      ctx.fillStyle = phase === 'aim' ? '#ffffff' : (isInSweetSpot(lockedAim) ? '#4ade80' : '#f87171');
      ctx.fillRect(indicatorX - 3, y - 5, 6, h + 10);
      
      // Glow effect when in sweet spot
      if (phase === 'aim' && isInSweetSpot(aim)) {
        ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
        ctx.fillRect(indicatorX - 6, y - 8, 12, h + 16);
      }

      // Border
      ctx.strokeStyle = '#f97316';
      ctx.lineWidth = 3;
      ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);

      // Labels
      ctx.fillStyle = '#fbbf24';
      ctx.font = '8px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('AIM', x + w/2, y - 10);
      
      // Left/Right indicators
      ctx.fillStyle = '#9ca3af';
      ctx.font = '6px "Press Start 2P"';
      ctx.textAlign = 'left';
      ctx.fillText('L', x + 5, y + 14);
      ctx.textAlign = 'right';
      ctx.fillText('R', x + w - 5, y + 14);
    }

    function drawNet() {
      var sway = Math.sin(frameCount * 0.15) * netSway * 12;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      
      for (var i = 0; i < 6; i++) {
        var x = hoop.x - hoop.rimWidth/2 + 6 + i * 8;
        var swayOffset = sway * (1 - Math.abs(i - 2.5) / 3);
        ctx.beginPath();
        ctx.moveTo(x, hoop.y + 3);
        ctx.quadraticCurveTo(x + swayOffset * 0.5, hoop.y + 20, hoop.x + swayOffset, hoop.y + 40);
        ctx.stroke();
      }
      
      [15, 28].forEach(function(yOff) {
        var s = sway * (yOff / 30);
        ctx.beginPath();
        ctx.moveTo(hoop.x - 18 + s * 0.3, hoop.y + yOff);
        ctx.lineTo(hoop.x + 18 + s * 0.3, hoop.y + yOff);
        ctx.stroke();
      });
    }

    function drawNFTPlayer(x, y) {
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(x, y + 38, 22, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      var imgSize = 70;
      ctx.save();
      ctx.drawImage(nftImage, x - imgSize/2, y - imgSize + 15, imgSize, imgSize);
      ctx.restore();

      ctx.fillStyle = '#deb887';
      ctx.fillRect(x + 20, y - 35, 8, 6);
      ctx.fillRect(x + 25, y - 42, 8, 10);
    }

    function drawBallerSprite(x, y, b) {
      var p = 3;
      
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(x, y + 38, 18, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = b.shoes;
      ctx.fillRect(x - 12, y + 30, p * 3, p * 2);
      ctx.fillRect(x + 3, y + 30, p * 3, p * 2);
      ctx.fillStyle = b.shoeAccent;
      ctx.fillRect(x - 12, y + 30, p * 3, p);
      ctx.fillRect(x + 3, y + 30, p * 3, p);

      ctx.fillStyle = b.skin;
      ctx.fillRect(x - 10, y + 10, p * 2, p * 7);
      ctx.fillRect(x + 4, y + 10, p * 2, p * 7);
      ctx.fillStyle = b.skinShade;
      ctx.fillRect(x - 10, y + 10, p, p * 7);
      ctx.fillRect(x + 4, y + 10, p, p * 7);

      ctx.fillStyle = b.shorts;
      ctx.fillRect(x - 12, y - 2, p * 8, p * 5);
      ctx.fillStyle = b.shortsStripe;
      ctx.fillRect(x - 12, y + 1, p * 8, p);

      ctx.fillStyle = b.jersey;
      ctx.fillRect(x - 13, y - 22, p * 9, p * 7);
      ctx.fillStyle = b.jerseyShade;
      ctx.fillRect(x - 13, y - 22, p * 3, p * 7);
      ctx.fillStyle = b.jerseyTrim;
      ctx.fillRect(x - 13, y - 22, p, p * 7);
      ctx.fillRect(x + 11, y - 22, p, p * 7);
      ctx.fillRect(x - 13, y - 22, p * 9, p);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 10px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText(b.number, x, y - 8);

      ctx.fillStyle = b.skin;
      ctx.fillRect(x - 18, y - 18, p * 2, p * 5);
      ctx.fillStyle = b.skinShade;
      ctx.fillRect(x - 18, y - 18, p, p * 5);

      ctx.fillStyle = b.skin;
      ctx.fillRect(x + 13, y - 25, p * 2, p * 3);
      ctx.fillRect(x + 16, y - 32, p * 2, p * 3);
      ctx.fillRect(x + 18, y - 38, p * 2, p * 2);

      ctx.fillStyle = b.skin;
      ctx.fillRect(x - 3, y - 26, p * 2, p * 2);

      ctx.fillStyle = b.skin;
      ctx.fillRect(x - 10, y - 45, p * 7, p * 7);
      ctx.fillStyle = b.skinShade;
      ctx.fillRect(x - 10, y - 45, p * 2, p * 7);

      ctx.fillStyle = b.hair;
      if (b.hairStyle === 'flat-top') {
        ctx.fillRect(x - 12, y - 55, p * 8, p * 4);
        ctx.fillRect(x - 10, y - 51, p * 7, p * 2);
        ctx.fillRect(x - 12, y - 45, p, p * 4);
        ctx.fillRect(x + 10, y - 45, p, p * 4);
      } else if (b.hairStyle === 'afro') {
        ctx.fillRect(x - 15, y - 60, p * 10, p * 6);
        ctx.fillRect(x - 12, y - 54, p * 8, p * 3);
        ctx.fillRect(x - 15, y - 48, p * 2, p * 5);
        ctx.fillRect(x + 10, y - 48, p * 2, p * 5);
      } else if (b.hairStyle === 'waves') {
        ctx.fillRect(x - 10, y - 50, p * 7, p * 3);
        ctx.fillRect(x - 7, y - 53, p * 5, p * 2);
        ctx.fillStyle = b.skinShade;
        ctx.fillRect(x - 5, y - 50, p, p);
        ctx.fillRect(x + 2, y - 50, p, p);
      }

      if (b.headband) {
        ctx.fillStyle = b.headband;
        ctx.fillRect(x - 12, y - 47, p * 8, p);
        ctx.fillStyle = b.headbandShade;
        ctx.fillRect(x - 12, y - 46, p * 8, p);
      }

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x - 7, y - 40, p, p * 2);
      ctx.fillRect(x + 4, y - 40, p, p * 2);
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(x - 6, y - 39, p, p);
      ctx.fillRect(x + 5, y - 39, p, p);

      ctx.fillStyle = b.hair;
      ctx.fillRect(x - 8, y - 42, p * 2, p);
      ctx.fillRect(x + 3, y - 42, p * 2, p);

      ctx.fillStyle = b.skinShade;
      ctx.fillRect(x - 1, y - 37, p, p * 2);

      if (b.grillz) {
        ctx.fillStyle = b.grillz;
        ctx.fillRect(x - 4, y - 32, p * 3, p);
      } else {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(x - 3, y - 32, p * 2, p);
      }

      if (b.goatee) {
        ctx.fillStyle = b.goatee;
        ctx.fillRect(x - 3, y - 30, p * 2, p * 2);
      }

      if (b.earring) {
        ctx.fillStyle = b.earring;
        ctx.fillRect(x - 13, y - 38, p, p);
      }

      if (b.chain) {
        ctx.fillStyle = b.chain;
        ctx.fillRect(x - 6, y - 24, p * 4, p);
        ctx.fillRect(x - 4, y - 23, p * 3, p);
      }
    }

    function drawBall(x, y, r, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);

      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#fb923c';
      ctx.beginPath();
      ctx.arc(-r/3, -r/3, r/2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#7c2d12';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -r);
      ctx.lineTo(0, r);
      ctx.moveTo(-r, 0);
      ctx.lineTo(r, 0);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(r * 0.35, 0, r * 0.65, -0.7, 0.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-r * 0.35, 0, r * 0.65, Math.PI - 0.7, Math.PI + 0.7);
      ctx.stroke();

      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
